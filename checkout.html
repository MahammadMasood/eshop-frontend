<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header-top">
          <div class="brand">
            <img class="logo" src="logo.svg" alt="Shop Fashion" />
            <div class="brand-mark">S</div>
            <span>Shop Fashion</span>
          </div>
          <div class="main-nav">
            <div class="nav-links">
              <a href="./index.html" class="nav-link">Home</a>
              <a href="./cart.html" class="nav-link">Cart</a>
            </div>
          </div>
        </div>
      </header>

      <main class="container">
        <section class="section">
          <div class="section-header">
            <div>
              <h1 class="section-title">Checkout</h1>
              <p class="section-subtitle">Enter your details to complete the order.</p>
            </div>
          </div>

          <div class="product-detail">
            <div>
              <div class="card stack-md">
                <div class="form-group">
                  <label for="name">Name</label>
                  <input id="name" placeholder="Jane Doe" />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" placeholder="jane@example.com" />
                </div>
                <p class="text-muted">Payment method: <strong>Cash on delivery</strong></p>
                <button class="btn" type="button" onclick="placeOrder()">Place order</button>
              </div>
            </div>
            <aside class="stack-md">
              <div class="section-banner">
                <div class="section-banner-text">
                  <div class="section-banner-title">Order summary</div>
                  <div id="summary-text" class="text-muted">Loading summary…</div>
                </div>
              </div>
            </aside>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <div>
            <div class="footer-title">Shop Fashion</div>
            <p class="text-muted">Secure checkout.</p>
          </div>
        </div>
        <div class="footer-bottom">
          <span>© <span id="year"></span> Shop Fashion</span>
          <span>Demo storefront</span>
        </div>
      </footer>
    </div>

    <script>
      const SERVER_BASE = "http://51.20.138.251:8000";
      const API_BASE = `${SERVER_BASE}/api`;

      async function loadSummary() {
        try {
          const res = await fetch(`${API_BASE}/cart/`, { credentials: "include" });
          const data = await res.json();
          const summary = document.getElementById("summary-text");
          if (!data.items || data.items.length === 0) {
            summary.textContent = "Your cart is empty.";
          } else {
            summary.textContent = `Items: ${data.items.length} · Total: $${data.total.toFixed(2)}`;
          }
        } catch {
          const summary = document.getElementById("summary-text");
          if (summary) summary.textContent = "Unable to load cart summary.";
        }
      }

      async function placeOrder() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const res = await fetch(`${API_BASE}/checkout/`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email }),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.detail || "Checkout failed");
          return;
        }
        const url = `./order_confirmation.html?order_id=${data.order_id}&delivery=${data.estimated_delivery || ""}`;
        window.location.href = url;
      }

      window.addEventListener("load", () => {
        const yearSpan = document.getElementById("year");
        if (yearSpan) {
          yearSpan.textContent = new Date().getFullYear().toString();
        }
        loadSummary();
      });
    </script>
  </body>
</html>
